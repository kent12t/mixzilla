<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111a30"/>
      <stop offset="100%" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="barGradCyan" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2ca0cb"/>
      <stop offset="100%" stop-color="#3df6ff"/>
    </linearGradient>
    <linearGradient id="barGradOrange" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff7d45"/>
      <stop offset="100%" stop-color="#ff974f"/>
    </linearGradient>
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="128" height="128" rx="24" fill="url(#bgGrad)" stroke="#22365f" stroke-width="4"/>
  
  <g transform="translate(20, 24)">
    <rect x="0" y="40" width="12" height="40" rx="4" fill="url(#barGradCyan)" filter="url(#glowCyan)"/>
    <rect x="18" y="20" width="12" height="60" rx="4" fill="url(#barGradOrange)" filter="url(#glowOrange)"/>
    <rect x="36" y="50" width="12" height="30" rx="4" fill="url(#barGradCyan)" filter="url(#glowCyan)"/>
    <rect x="54" y="10" width="12" height="70" rx="4" fill="url(#barGradOrange)" filter="url(#glowOrange)"/>
    <rect x="72" y="30" width="12" height="50" rx="4" fill="url(#barGradCyan)" filter="url(#glowCyan)"/>
  </g>
</svg>